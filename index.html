<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Инспектор Больничных Систем</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .page { display: none; }
        .page.active { display: block; }
        .loader-overlay { background: rgba(255,255,255,0.9); z-index: 100; }
        .status-btn.selected { border-width: 3px; border-color: #1f2937; transform: scale(0.98); }
        select optgroup { font-weight: bold; color: #4f46e5; background: #e0e7ff; }
        select option { font-weight: normal; color: #111827; background: #fff; }
        
        .loader {
            border: 4px solid #f3f3f3; border-top: 4px solid #4f46e5;
            border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-gray-800">

    <div id="loader" class="fixed inset-0 flex flex-col items-center justify-center hidden loader-overlay">
        <div class="loader"></div>
        <p class="mt-4 text-gray-700 font-bold text-lg" id="loaderText" data-i18n="syncText">Синхронизация с базой...</p>
    </div>

    <div id="setupPage" class="page active p-4 md:p-8 max-w-lg mx-auto mt-6">
        <div class="bg-white p-8 rounded-2xl shadow-lg border border-gray-100">
            <div class="text-center mb-8">
                <i class="fas fa-hospital-user fa-4x text-indigo-500 mb-4"></i>
                <h1 class="text-3xl font-black text-gray-800" data-i18n="title">Инспекция Систем</h1>
                <p class="text-gray-500 font-medium mt-2" data-i18n="subtitle">Управление активами и ремонтом</p>
            </div>
            
            <div class="space-y-5">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1" data-i18n="inspectorLabel">ФИО проверяющего</label>
                    <input type="text" id="inspectorName" class="w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 font-semibold text-lg">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1" data-i18n="deptLabel">Отделение</label>
                    <input type="text" id="department" class="w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 font-semibold text-lg">
                </div>
            </div>

            <button onclick="startInspection()" class="w-full mt-8 bg-indigo-600 text-white py-4 px-4 rounded-xl shadow-md text-lg font-bold hover:bg-indigo-700 transition-colors" data-i18n="startBtn">
                Начать инспекцию
            </button>
        </div>
    </div>

    <div id="inspectionPage" class="page p-3 md:p-6 max-w-3xl mx-auto">
        
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-200 mb-4 flex justify-between items-center">
            <div>
                <h2 class="text-xl font-black text-gray-800" data-i18n="roomCheckTitle">Проверка помещений</h2>
                <p class="text-sm text-indigo-600 font-bold mt-1" id="headerInfo"></p>
            </div>
            <button onclick="confirmExit()" class="bg-red-50 text-red-600 p-3 rounded-xl hover:bg-red-100 transition-colors">
                <i class="fas fa-sign-out-alt fa-lg"></i>
            </button>
        </div>
        
        <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-200 mb-4">
            <label class="block text-sm font-bold text-gray-700 mb-2" data-i18n="roomLabel">Номер или название помещения:</label>
            <div class="flex gap-2">
                <input type="text" id="roomName" class="flex-1 px-4 py-3 bg-gray-50 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 font-bold text-lg" data-i18n-ph="roomPlaceholder" placeholder="Напр: 101">
                <button onclick="openRoom()" class="px-6 py-3 bg-indigo-600 text-white rounded-xl hover:bg-indigo-700 font-bold text-lg shadow-sm" data-i18n="okBtn">ОК</button>
            </div>
        </div>

        <div id="activeRoomBlock" class="hidden">
            
            <div class="bg-indigo-600 text-white p-4 rounded-2xl shadow-md mb-4 flex justify-between items-center">
                <h3 class="text-xl font-black"><span data-i18n="roomPrefix">Помещение:</span> <span id="currentRoomDisplay" class="text-yellow-300"></span></h3>
            </div>

            <button id="allGoodBtn" onclick="saveRoomData(true)" class="w-full bg-green-500 text-white py-4 px-4 rounded-2xl shadow-md font-black text-lg mb-6 hover:bg-green-600 transition-transform transform active:scale-95 flex justify-center items-center gap-2">
                <i class="fas fa-check-circle text-2xl"></i> <span data-i18n="allGoodBtn">В помещении всё исправно</span>
            </button>
            
            <div id="issuesList" class="space-y-4 mb-4"></div>

            <button onclick="addIssueRow()" class="w-full bg-white border-2 border-dashed border-indigo-400 text-indigo-600 py-4 px-4 rounded-2xl mb-6 hover:bg-indigo-50 font-bold text-lg flex justify-center items-center shadow-sm">
                <i class="fas fa-plus-circle mx-2 text-xl"></i> <span data-i18n="addIssueBtn">Добавить неисправность</span>
            </button>

            <button id="saveRoomBtn" onclick="saveRoomData(false)" class="hidden w-full bg-indigo-800 text-white py-4 px-6 rounded-2xl shadow-md hover:bg-indigo-900 font-black text-lg flex justify-center items-center gap-2">
                <i class="fas fa-save text-xl"></i> <span data-i18n="saveRoomBtn">Сохранить дефекты помещения</span>
            </button>
        </div>

        <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-200 mt-8 mb-6">
            <h4 class="text-xs font-black text-gray-400 uppercase mb-3"><i class="fas fa-history mx-1"></i> <span data-i18n="inspectedTitle">Уже проверено (нажмите для деталей):</span></h4>
            
            <div id="inspectedRoomsList" class="flex flex-wrap gap-2 text-sm font-bold">
                <span class="text-gray-400" data-i18n="emptyList">(пока пусто)</span>
            </div>

            <div id="roomDetailsDisplay" class="hidden mt-4 bg-indigo-50 p-4 rounded-xl border border-indigo-100 shadow-inner">
                </div>
        </div>

        <button onclick="finishDepartment()" class="w-full bg-red-600 text-white py-5 px-6 rounded-2xl shadow-lg hover:bg-red-700 font-black text-lg flex justify-center items-center gap-2" data-i18n="finishBtn">
            <i class="fas fa-flag-checkered text-xl"></i> Завершить проверку отделения
        </button>
    </div>

    <template id="issueTemplate">
        <div class="issue-row bg-white p-5 rounded-2xl border-l-4 border-indigo-500 shadow-md relative mb-4">
            <button onclick="removeIssue(this)" class="absolute -top-3 -right-3 bg-red-100 text-red-600 w-10 h-10 rounded-full shadow-sm border border-red-200 flex items-center justify-center hover:bg-red-200"><i class="fas fa-trash-alt"></i></button>
            
            <label class="block text-xs font-black text-gray-400 uppercase mb-2" data-i18n="whatBroken">Что неисправно?</label>
            <select class="system-select w-full p-4 mb-2 rounded-xl bg-gray-50 border border-gray-300 font-bold text-gray-900 text-lg focus:ring-2 focus:ring-indigo-500" onchange="toggleCustomInput(this)"></select>
            <input type="text" class="custom-system-input hidden w-full p-4 mb-4 rounded-xl border border-gray-300 font-bold text-lg" data-i18n-ph="customPlaceholder" placeholder="Впишите название...">
            
            <label class="block text-xs font-black text-gray-400 uppercase mt-4 mb-2" data-i18n="ratingLabel">Действие:</label>
            <div class="rating-block flex flex-col sm:flex-row gap-3 mb-4">
                <button data-v="2" class="status-btn flex-1 py-3 px-4 rounded-xl bg-orange-500 text-white font-bold text-lg shadow-sm flex items-center justify-center gap-2" onclick="setRating(this, 2)">
                    <i class="fas fa-tools"></i> <span data-i18n="btnRepair">Ремонт</span>
                </button>
                <button data-v="1" class="status-btn flex-1 py-3 px-4 rounded-xl bg-red-600 text-white font-bold text-lg shadow-sm flex items-center justify-center gap-2" onclick="setRating(this, 1)">
                    <i class="fas fa-sync-alt"></i> <span data-i18n="btnReplace">Замена</span>
                </button>
            </div>
            
            <div class="flex gap-2 items-start mt-4">
                <textarea class="comment-text flex-1 p-4 text-base border border-gray-300 rounded-xl font-medium focus:ring-2 focus:ring-indigo-500" rows="2" data-i18n-ph="commentPlaceholder" placeholder="Описание поломки (обязательно)..."></textarea>
                <label class="p-4 bg-gray-50 border border-gray-300 rounded-xl cursor-pointer flex flex-col items-center justify-center w-20 hover:bg-gray-100 h-full min-h-[90px]" onclick="vibrate('light')">
                    <i class="fas fa-camera text-gray-400 text-2xl mb-1"></i>
                    <span class="text-[10px] text-gray-500 font-bold uppercase" data-i18n="photoLabel">Фото</span>
                    <input type="file" accept="image/*" capture="environment" class="hidden photo-input" onchange="handlePhoto(this)">
                </label>
            </div>
            <div class="photo-indicator hidden text-sm text-green-600 font-bold mt-3 bg-green-50 p-2 rounded-lg text-center"><i class="fas fa-check-circle mx-1"></i><span data-i18n="photoAdded">Фотография добавлена</span></div>
        </div>
    </template>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxMN6s8ektwhHxuE_8xDz1ZaeqYyXaLyniwi_xFpbzVEjFEo_AUd6PybJk6nGKxmy7E/exec";
        
        const dict = {
            ru: { syncText: "Синхронизация...", title: "Инспекция Систем", subtitle: "Управление активами и ремонтом", inspectorLabel: "ФИО инспектора", deptLabel: "Отделение (напр. А 1)", startBtn: "Начать проверку", roomCheckTitle: "Проверка помещений", roomLabel: "Номер или название помещения:", roomPlaceholder: "Напр: 101", okBtn: "ОК", roomPrefix: "Помещение:", allGoodBtn: "В помещении всё исправно", addIssueBtn: "Добавить неисправность", saveRoomBtn: "Сохранить дефекты помещения", inspectedTitle: "Уже проверено (нажмите для деталей):", emptyList: "(пока пусто)", finishBtn: "Завершить проверку отделения", whatBroken: "Что неисправно?", ratingLabel: "Действие:", btnRepair: "Ремонт", btnReplace: "Замена", selectDefault: "Выберите систему...", otherOption: "🔧 Другое (вписать вручную)...", customPlaceholder: "Впишите название...", commentPlaceholder: "Описание поломки (обязательно)...", photoLabel: "Фото", photoAdded: "Фотография добавлена", alertUnsavedRoom: "Внимание! Сначала сохраните текущее открытое помещение!", detailsTitle: "Детали помещения" },
            he: { syncText: "מסנכרן...", title: "בדיקת מערכות", subtitle: "ניהול נכסים ותיקונים", inspectorLabel: "שם הבודק", deptLabel: "מחלקה (לדוגמה A 1)", startBtn: "התחל בדיקה", roomCheckTitle: "בדיקת חדרים", roomLabel: "מספר או שם חדר:", roomPlaceholder: "לדוגמה: 101", okBtn: "אישור", roomPrefix: "חדר:", allGoodBtn: "הכל תקין בחדר זה", addIssueBtn: "הוסף תקלה", saveRoomBtn: "שמור תקלות חדר", inspectedTitle: "כבר נבדקו (לחץ לפירוט):", emptyList: "(ריק)", finishBtn: "סיים בדיקת מחלקה", whatBroken: "מה תקול?", ratingLabel: "פעולה:", btnRepair: "תיקון", btnReplace: "החלפה", selectDefault: "בחר מערכת...", otherOption: "🔧 אחר (הזן ידנית)...", customPlaceholder: "הזן שם...", commentPlaceholder: "תיאור התקלה (חובה)...", photoLabel: "תמונה", photoAdded: "תמונה צורפה", alertUnsavedRoom: "שים לב! אנא שמור קודם את החדר הפתוח הנוכחי!", detailsTitle: "פירוט חדר" }
        };

        const isHebrew = (navigator.language || navigator.userLanguage).toLowerCase().startsWith('he');
        const T = dict[isHebrew ? 'he' : 'ru'];

        let state = { 
            inspector: '', department: '', currentRoom: '', 
            inspectedRooms: {}, 
            categories: {}, stats: { critical: 0, replace: 0 }, isRunning: false
        };

        // --- УМНАЯ ВИБРАЦИЯ ---
        function vibrate(type = 'light') {
            if (!navigator.vibrate) return;
            try {
                if (type === 'light') navigator.vibrate(30);
                else if (type === 'medium') navigator.vibrate(60);
                else if (type === 'success') navigator.vibrate([30, 50, 30]);
                else if (type === 'error') navigator.vibrate([100, 50, 100]);
            } catch(e) {}
        }

        // Обертка для системных предупреждений с вибрацией
        function appAlert(message) {
            vibrate('error');
            alert(message);
        }

        window.addEventListener('beforeunload', e => { if (state.isRunning) { e.preventDefault(); e.returnValue = ''; } });

        document.addEventListener("DOMContentLoaded", () => {
            if (isHebrew) {
                document.documentElement.dir = 'rtl'; document.documentElement.lang = 'he';
                document.getElementById('roomName').classList.replace('rounded-l-xl', 'rounded-r-xl');
                document.getElementById('roomName').nextElementSibling.classList.replace('rounded-r-xl', 'rounded-l-xl');
            }
            applyTranslations(document);
            restoreSession(); 
        });

        function applyTranslations(container) {
            container.querySelectorAll('[data-i18n]').forEach(el => el.innerHTML = T[el.dataset.i18n]);
            container.querySelectorAll('[data-i18n-ph]').forEach(el => el.placeholder = T[el.getAttribute('data-i18n-ph')]);
        }

        function saveSession() { localStorage.setItem('hcl_state_v2', JSON.stringify(state)); }
        
        function restoreSession() {
            const saved = localStorage.getItem('hcl_state_v2');
            if (saved) {
                state = JSON.parse(saved);
                if (state.isRunning) {
                    document.getElementById('headerInfo').innerText = `${state.inspector} | ${state.department}`;
                    updateInspectedUI();
                    navigate('inspectionPage');
                }
            }
        }

        function clearSession() { state.isRunning = false; localStorage.removeItem('hcl_state_v2'); location.reload(); }

        function confirmExit() { 
            vibrate('medium');
            if(confirm(isHebrew ? "לצאת מהבדיקה? הנתונים יאבדו." : "Выйти из инспекции? Несохраненные данные будут потеряны.")) clearSession(); 
        }

        async function startInspection() {
            vibrate('light');
            const insp = document.getElementById('inspectorName').value.trim();
            const dept = document.getElementById('department').value.trim();
            if(!insp || !dept) return appAlert(isHebrew ? "מלא את כל השדות!" : "Заполните все поля!");
            
            state.inspector = insp; state.department = dept; state.isRunning = true;
            showLoader(isHebrew ? "טוען נתונים..." : "Загрузка базы...");
            
            try {
                const cached = localStorage.getItem('hcl_cats');
                if (cached) state.categories = JSON.parse(cached);

                const res = await fetch(`${API_URL}?action=getSettings`);
                const data = await res.json();
                if (data.categories && Object.keys(data.categories).length > 0) {
                    state.categories = data.categories;
                    localStorage.setItem('hcl_cats', JSON.stringify(state.categories)); 
                }
            } catch(e) { console.log("Используем кэш"); }
            
            if(Object.keys(state.categories).length === 0) {
                state.categories = isHebrew ? {"כללי": ["חלון", "דלת"]} : {"Общее": ["Окно", "Дверь"]};
            }

            saveSession();
            document.getElementById('headerInfo').innerText = `${state.inspector} | ${state.department}`;
            navigate('inspectionPage');
            hideLoader();
            vibrate('success');
        }

        function openRoom() {
            vibrate('light');
            if (!document.getElementById('activeRoomBlock').classList.contains('hidden')) {
                return appAlert(T.alertUnsavedRoom);
            }

            const name = document.getElementById('roomName').value.trim();
            if(!name) return;
            state.currentRoom = name;
            document.getElementById('currentRoomDisplay').innerText = name;
            document.getElementById('issuesList').innerHTML = ''; 
            
            document.getElementById('allGoodBtn').classList.remove('hidden');
            document.getElementById('saveRoomBtn').classList.add('hidden');
            document.getElementById('activeRoomBlock').classList.remove('hidden');
        }

        function addIssueRow() {
            vibrate('light');
            document.getElementById('allGoodBtn').classList.add('hidden');
            document.getElementById('saveRoomBtn').classList.remove('hidden');

            const temp = document.getElementById('issueTemplate').content.cloneNode(true);
            applyTranslations(temp);
            const select = temp.querySelector('.system-select');
            
            let opts = `<option value="" disabled selected>${T.selectDefault}</option>`;
            for (const cat in state.categories) {
                opts += `<optgroup label="--- ${cat.toUpperCase()} ---">`;
                state.categories[cat].forEach(sys => opts += `<option value="${sys}">${sys}</option>`);
                opts += `</optgroup>`;
            }
            opts += `<option value="OTHER">${T.otherOption}</option>`;
            select.innerHTML = opts;
            
            document.getElementById('issuesList').appendChild(temp);
        }

        function removeIssue(btn) {
            vibrate('medium');
            btn.parentElement.remove();
            if (document.querySelectorAll('.issue-row').length === 0) {
                document.getElementById('allGoodBtn').classList.remove('hidden');
                document.getElementById('saveRoomBtn').classList.add('hidden');
            }
        }

        function toggleCustomInput(sel) {
            const inp = sel.parentElement.querySelector('.custom-system-input');
            if (sel.value === 'OTHER') { inp.classList.remove('hidden'); inp.focus(); } 
            else { inp.classList.add('hidden'); inp.value = ''; }
        }

        function setRating(btn, val) {
            vibrate('light');
            const parent = btn.parentElement;
            parent.querySelectorAll('.status-btn').forEach(b => b.classList.remove('selected', 'ring-4', 'ring-gray-300'));
            btn.classList.add('selected', 'ring-4', 'ring-gray-300');
            parent.dataset.val = val;
        }

        async function handlePhoto(input) {
            const file = input.files[0];
            if(!file) return;
            vibrate('light');
            const icon = input.closest('label').querySelector('i');
            icon.className = "fas fa-spinner fa-spin text-indigo-500 text-2xl mb-1";

            const base64 = await new Promise(resolve => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const scale = 800 / img.width;
                        canvas.width = 800; canvas.height = img.height * scale;
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        resolve(canvas.toDataURL('image/jpeg', 0.6)); 
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
            input.dataset.base64 = base64;
            icon.className = "fas fa-camera text-green-500 text-2xl mb-1";
            input.closest('.issue-row').querySelector('.photo-indicator').classList.remove('hidden');
            vibrate('success');
        }

        async function saveRoomData(isAllGood) {
            vibrate('light');
            const items = [];
            let historyLog = []; 

            if (!isAllGood) {
                const rows = document.querySelectorAll('.issue-row');
                for(let row of rows) {
                    let sys = row.querySelector('.system-select').value;
                    if(sys === 'OTHER') sys = row.querySelector('.custom-system-input').value.trim();
                    const rBlock = row.querySelector('.rating-block');
                    const rating = rBlock ? rBlock.dataset.val : null;
                    const comment = row.querySelector('.comment-text').value.trim();
                    
                    if(!sys || !rating || !comment) return appAlert(isHebrew ? "מלא את כל שדות החובה והפעולות!" : "Выберите систему, действие и опишите поломку!");
                    
                    items.push({ name: sys, score: rating, comment: comment, photoBase64: row.querySelector('.photo-input').dataset.base64 || "" });
                    
                    const actionText = rating == 1 ? T.btnReplace : T.btnRepair;
                    historyLog.push(`• ${sys} (${actionText})`);

                    if(rating <= 2) state.stats.critical++;
                    if(rating == 1) state.stats.replace++;
                }
            } else {
                historyLog.push(isHebrew ? "✅ הכל תקין" : "✅ Всё исправно");
            }

            showLoader(T.syncText);
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ inspector: state.inspector, department: state.department, room: state.currentRoom, items: items })
                });
                await res.json();
                
                state.inspectedRooms[state.currentRoom] = historyLog;
                saveSession(); 
                updateInspectedUI();
                
                document.getElementById('activeRoomBlock').classList.add('hidden');
                document.getElementById('roomName').value = '';
                document.getElementById('roomDetailsDisplay').classList.add('hidden'); 
                window.scrollTo(0, 0); 
                vibrate('success'); // Двойная вибрация при успешном сохранении!
            } catch(e) {
                appAlert("Network error. Try again.");
            }
            hideLoader();
        }

        function updateInspectedUI() {
            const listDiv = document.getElementById('inspectedRoomsList');
            const rooms = Object.keys(state.inspectedRooms);
            if(rooms.length > 0) listDiv.innerHTML = '';
            
            rooms.forEach(room => {
                const badge = document.createElement('button');
                badge.className = "room-badge bg-indigo-100 border border-indigo-200 text-indigo-800 px-4 py-2 rounded-xl shadow-sm hover:bg-indigo-200 active:scale-95 transition-transform";
                badge.innerText = room;
                badge.onclick = (e) => { vibrate('light'); showRoomHistory(room, e.currentTarget); };
                listDiv.appendChild(badge);
            });
        }

        function showRoomHistory(roomName, badgeElement) {
            const history = state.inspectedRooms[roomName];
            const display = document.getElementById('roomDetailsDisplay');
            
            document.querySelectorAll('.room-badge').forEach(b => b.classList.remove('ring-2', 'ring-indigo-600'));
            if(badgeElement) badgeElement.classList.add('ring-2', 'ring-indigo-600');

            let html = `<h5 class="font-black text-indigo-700 mb-2 border-b border-indigo-200 pb-2">${T.detailsTitle} ${roomName}:</h5><ul class="space-y-1">`;
            history.forEach(item => {
                html += `<li class="text-sm font-bold text-gray-700">${item}</li>`;
            });
            html += `</ul>`;
            
            display.innerHTML = html;
            display.classList.remove('hidden');
        }

        async function finishDepartment() {
            vibrate('light');
            if (!document.getElementById('activeRoomBlock').classList.contains('hidden')) {
                return appAlert(T.alertUnsavedRoom);
            }

            if(Object.keys(state.inspectedRooms).length === 0) return appAlert(isHebrew ? "לא נבדקו חדרים!" : "Вы не проверили ни одной комнаты!");
            if(!confirm(isHebrew ? "לסיים ולשלוח דיווח לטלגרם?" : "Завершить и отправить отчет в Telegram?")) return;
            
            showLoader("Отправка...");
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: "FINISH_DEPT", inspector: state.inspector, department: state.department,
                        criticalCount: state.stats.critical, replaceCount: state.stats.replace, roomsCount: Object.keys(state.inspectedRooms).length
                    })
                });
                vibrate('success');
                alert("✅ Отчет отправлен!");
                clearSession(); 
            } catch (e) {
                appAlert("Ошибка интернета.");
                hideLoader();
            }
        }

        function navigate(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        function showLoader(txt) { document.getElementById('loaderText').innerText = txt; document.getElementById('loader').classList.remove('hidden'); }
        function hideLoader() { document.getElementById('loader').classList.add('hidden'); }
    </script>
</body>
</html>
