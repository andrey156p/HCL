<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Инспектор Больничных Систем</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .page { display: none; }
        .page.active { display: block; }
        .rating-btn.selected { border-width: 3px; border-color: #000; }
        .loader-overlay { background: rgba(255,255,255,0.8); z-index: 100; }
    </style>
</head>
<body class="bg-gray-100">

    <div id="loader" class="fixed inset-0 flex flex-col items-center justify-center hidden loader-overlay">
        <div class="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
        <p class="mt-4 font-medium text-gray-700">Синхронизация...</p>
    </div>

    <div id="setupPage" class="page active p-6 max-w-md mx-auto">
        <div class="bg-white p-6 rounded-2xl shadow-xl">
            <h1 class="text-2xl font-bold text-center mb-6">🏥 Вход в систему</h1>
            <input type="text" id="inspectorName" placeholder="ФИО инспектора" class="w-full mb-4 p-3 border rounded-lg">
            <input type="text" id="department" placeholder="Название отделения" class="w-full mb-6 p-3 border rounded-lg">
            <button onclick="startInspection()" class="w-full bg-indigo-600 text-white p-4 rounded-xl font-bold shadow-lg">Начать инспекцию</button>
        </div>
    </div>

    <div id="inspectionPage" class="page p-4 max-w-2xl mx-auto">
        <div class="bg-white p-5 rounded-2xl shadow-lg mb-6">
            <div class="flex justify-between items-center mb-4">
                <h2 class="font-bold text-lg" id="headerInfo"></h2>
                <button onclick="location.reload()" class="text-gray-400"><i class="fas fa-sign-out-alt"></i></button>
            </div>
            
            <div id="roomInputBlock">
                <label class="block text-sm font-medium mb-1">Номер комнаты / Помещение:</label>
                <div class="flex gap-2">
                    <input type="text" id="roomName" class="flex-1 p-3 border rounded-lg" placeholder="Напр: 101">
                    <button onclick="openRoom()" class="bg-indigo-600 text-white px-6 rounded-lg font-bold">ОК</button>
                </div>
            </div>

            <div id="activeRoomBlock" class="hidden mt-4 pt-4 border-t">
                <h3 class="font-bold text-indigo-600 mb-4">Комната: <span id="currentRoomDisplay"></span></h3>
                
                <div id="issuesList" class="space-y-4 mb-6">
                    </div>

                <button onclick="addIssueRow()" class="w-full border-2 border-dashed border-indigo-300 text-indigo-600 p-3 rounded-lg mb-6">
                    <i class="fas fa-plus-circle mr-2"></i>Добавить замечание
                </button>

                <button id="saveRoomBtn" onclick="saveRoomData()" class="w-full bg-green-600 text-white p-4 rounded-xl font-bold shadow-md">
                    Сохранить проверку комнаты
                </button>
            </div>
        </div>

        <div class="bg-indigo-50 p-4 rounded-xl">
            <h4 class="text-xs font-bold text-indigo-400 uppercase mb-2">Уже проверено:</h4>
            <div id="inspectedRoomsList" class="flex flex-wrap gap-2 text-sm text-indigo-700 font-medium">
                (пусто)
            </div>
        </div>

        <button onclick="finishDepartment()" class="w-full mt-10 bg-red-500 text-white p-4 rounded-xl font-bold shadow-lg">
            Завершить инспекцию отделения
        </button>
    </div>

    <template id="issueTemplate">
        <div class="issue-row bg-gray-50 p-3 rounded-xl border relative">
            <button onclick="this.parentElement.remove()" class="absolute -top-2 -right-2 bg-white text-red-500 w-6 h-6 rounded-full shadow border flex items-center justify-center">×</button>
            <select class="system-select w-full p-2 mb-2 rounded bg-white border font-bold">
                </select>
            <div class="flex gap-1 mb-2 justify-center">
                <button data-v="1" class="rb w-10 h-10 rounded-full bg-red-500 text-white font-bold" onclick="setRating(this, 1)">1</button>
                <button data-v="2" class="rb w-10 h-10 rounded-full bg-orange-500 text-white font-bold" onclick="setRating(this, 2)">2</button>
                <button data-v="3" class="rb w-10 h-10 rounded-full bg-yellow-500 text-white font-bold" onclick="setRating(this, 3)">3</button>
                <button data-v="4" class="rb w-10 h-10 rounded-full bg-green-500 text-white font-bold" onclick="setRating(this, 4)">4</button>
            </div>
            <div class="flex gap-2">
                <textarea class="comment-text flex-1 p-2 text-sm border rounded" placeholder="Описание недочёта (обязательно)..."></textarea>
                <label class="p-2 bg-white border rounded cursor-pointer flex items-center justify-center w-12 h-10">
                    <i class="fas fa-camera text-gray-400"></i>
                    <input type="file" accept="image/*" capture="environment" class="hidden photo-input" onchange="handlePhoto(this)">
                </label>
            </div>
            <div class="photo-indicator hidden text-[10px] text-green-600 mt-1"><i class="fas fa-check"></i> Фото добавлено</div>
        </div>
    </template>

    <script>
        const API_URL = "ВАШ_URL_СКРИПТА";
        let state = { 
            inspector: '', department: '', currentRoom: '', 
            inspectedRooms: [], systemsList: [], 
            stats: { critical: 0, replace: 0 } 
        };

        async function startInspection() {
            state.inspector = document.getElementById('inspectorName').value;
            state.department = document.getElementById('department').value;
            if(!state.inspector || !state.department) return alert("Заполните данные!");
            
            showLoader();
            try {
                // Подтягиваем список систем из настроек таблицы
                const res = await fetch(`${API_URL}?action=getSettings`);
                const data = await res.json();
                state.systemsList = data.systems;
                
                document.getElementById('headerInfo').innerText = `${state.inspector} | ${state.department}`;
                navigate('inspectionPage');
            } catch(e) { alert("Ошибка загрузки настроек!"); }
            hideLoader();
        }

        function openRoom() {
            const name = document.getElementById('roomName').value.trim();
            if(!name) return;
            state.currentRoom = name;
            document.getElementById('currentRoomDisplay').innerText = name;
            document.getElementById('issuesList').innerHTML = '';
            document.getElementById('activeRoomBlock').classList.remove('hidden');
        }

        function addIssueRow() {
            const temp = document.getElementById('issueTemplate').content.cloneNode(true);
            const select = temp.querySelector('.system-select');
            state.systemsList.forEach(s => {
                const opt = document.createElement('option');
                opt.value = s; opt.innerText = s;
                select.appendChild(opt);
            });
            document.getElementById('issuesList').appendChild(temp);
        }

        function setRating(btn, val) {
            const parent = btn.parentElement;
            parent.querySelectorAll('.rb').forEach(b => b.classList.remove('selected', 'ring-2', 'ring-black'));
            btn.classList.add('selected', 'ring-2', 'ring-black');
            parent.dataset.val = val;
        }

        async function handlePhoto(input) {
            const file = input.files[0];
            if(!file) return;
            const indicator = input.closest('.issue-row').querySelector('.photo-indicator');
            // Сжатие
            const base64 = await new Promise(resolve => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const scale = 800 / img.width;
                        canvas.width = 800; canvas.height = img.height * scale;
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        resolve(canvas.toDataURL('image/jpeg', 0.6));
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
            input.dataset.base64 = base64;
            indicator.classList.remove('hidden');
        }

        async function saveRoomData() {
            const rows = document.querySelectorAll('.issue-row');
            if(rows.length === 0) {
                // Если замечаний нет, просто помечаем комнату проверенной
                markRoomDone();
                return;
            }

            const items = [];
            for(let row of rows) {
                const rating = row.querySelector('.flex.gap-1').dataset.val;
                const comment = row.querySelector('.comment-text').value.trim();
                if(!rating) return alert("Укажите оценку!");
                if(rating < 4 && !comment) return alert("Добавьте описание недочёта!");
                
                items.push({
                    name: row.querySelector('.system-select').value,
                    score: rating,
                    comment: comment,
                    photoBase64: row.querySelector('.photo-input').dataset.base64 || ""
                });

                if(rating <= 2) state.stats.critical++;
                if(rating == 1) state.stats.replace++;
            }

            showLoader();
            const res = await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({
                    inspector: state.inspector, department: state.department,
                    room: state.currentRoom, items: items
                })
            });
            hideLoader();
            markRoomDone();
        }

        function markRoomDone() {
            state.inspectedRooms.push(state.currentRoom);
            document.getElementById('inspectedRoomsList').innerText = state.inspectedRooms.join(', ');
            document.getElementById('activeRoomBlock').classList.add('hidden');
            document.getElementById('roomName').value = '';
            window.scrollTo(0,0);
        }

        async function finishDepartment() {
            if(!confirm("Завершить инспекцию и отправить отчет в Telegram?")) return;
            showLoader();
            await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: "FINISH_DEPT",
                    inspector: state.inspector, department: state.department,
                    criticalCount: state.stats.critical,
                    replaceCount: state.stats.replace,
                    roomsCount: state.inspectedRooms.length
                })
            });
            alert("Отчет отправлен! Приложение будет перезагружено.");
            location.reload();
        }

        function navigate(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        function showLoader() { document.getElementById('loader').classList.remove('hidden'); }
        function hideLoader() { document.getElementById('loader').classList.add('hidden'); }
    </script>
</body>
</html>
