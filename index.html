<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Инспектор Больничных Систем</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .page { display: none; }
        .page.active { display: block; }
        .rating-btn.selected { border-width: 3px; border-color: #000; }
        .loader-overlay { background: rgba(255,255,255,0.9); z-index: 100; }
        
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4f46e5;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-100">

    <div id="loader" class="fixed inset-0 flex flex-col items-center justify-center hidden loader-overlay">
        <div class="loader"></div>
        <p class="mt-4 text-gray-700 font-bold" id="loaderText" data-i18n="syncText">Синхронизация с базой...</p>
    </div>

    <div id="setupPage" class="page active p-4 md:p-8 max-w-lg mx-auto mt-10">
        <div class="bg-white p-6 rounded-xl shadow-md">
            <div class="text-center mb-6">
                <i class="fas fa-hospital-user fa-3x text-indigo-500"></i>
                <h1 class="text-2xl font-bold text-gray-800 mt-2" data-i18n="title">Инспекция Систем</h1>
                <p class="text-gray-500" data-i18n="subtitle">Регистрация неисправностей</p>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label for="inspectorName" class="block text-sm font-medium text-gray-700" data-i18n="inspectorLabel">ФИО проверяющего</label>
                    <input type="text" id="inspectorName" class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500">
                </div>
                <div>
                    <label for="department" class="block text-sm font-medium text-gray-700" data-i18n="deptLabel">Отделение (например, A 1)</label>
                    <input type="text" id="department" class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500">
                </div>
            </div>

            <div class="mt-8 space-y-3">
                <button onclick="startInspection()" class="w-full bg-indigo-600 text-white py-3 px-4 border border-transparent rounded-md shadow-sm text-base font-bold hover:bg-indigo-700 transition-colors" data-i18n="startBtn">
                    Начать инспекцию
                </button>
            </div>
        </div>
    </div>

    <div id="inspectionPage" class="page p-4 md:p-8 max-w-4xl mx-auto">
        <div class="bg-white p-6 rounded-xl shadow-md mb-6">
            <div class="flex justify-between items-center mb-4 border-b pb-4">
                <div>
                    <h2 class="text-xl font-bold text-gray-800" data-i18n="roomCheckTitle">Проверка помещений</h2>
                    <p class="text-sm text-gray-500" id="headerInfo"></p>
                </div>
                <button onclick="confirmExit()" class="bg-gray-200 text-gray-600 py-2 px-4 rounded-md shadow-sm hover:bg-red-100 hover:text-red-600 transition-colors" title="Выход">
                    <i class="fas fa-sign-out-alt mx-1"></i> <span data-i18n="exitBtn">Выход</span>
                </button>
            </div>
            
            <div id="roomInputBlock">
                <label class="block text-sm font-medium text-gray-700 mb-1" data-i18n="roomLabel">Номер комнаты / Название помещения:</label>
                <div class="mt-1 flex rounded-md shadow-sm">
                    <input type="text" id="roomName" class="flex-1 block w-full min-w-0 rounded-none px-3 py-2 border border-gray-300 focus:ring-indigo-500" data-i18n-ph="roomPlaceholder" placeholder="Напр: Палата 101">
                    <button onclick="openRoom()" class="inline-flex items-center px-6 py-2 border border-indigo-600 bg-indigo-600 text-white hover:bg-indigo-700 font-bold" data-i18n="okBtn">ОК</button>
                </div>
            </div>

            <div id="activeRoomBlock" class="hidden mt-6 pt-4 border-t">
                <h3 class="text-lg font-semibold text-gray-700 mb-4"><span data-i18n="roomPrefix">Помещение:</span> <span id="currentRoomDisplay" class="text-indigo-600 font-bold"></span></h3>
                
                <div id="issuesList" class="space-y-5 mb-6"></div>

                <button onclick="addIssueRow()" class="w-full border-2 border-dashed border-indigo-300 text-indigo-600 bg-indigo-50 py-3 px-4 rounded-lg mb-6 hover:bg-indigo-100 font-bold flex justify-center items-center">
                    <i class="fas fa-plus-circle mx-2 text-lg"></i> <span data-i18n="addIssueBtn">Добавить дефект</span>
                </button>

                <button id="saveRoomBtn" onclick="saveRoomData()" class="w-full bg-green-600 text-white py-4 px-6 rounded-md shadow-sm hover:bg-green-700 font-bold text-lg" data-i18n="saveRoomBtn">
                    Сохранить помещение
                </button>
            </div>
        </div>

        <div class="bg-indigo-50 p-5 rounded-xl shadow-sm border border-indigo-100 mb-8">
            <h4 class="text-xs font-bold text-indigo-400 uppercase mb-3"><i class="fas fa-check-double mx-1"></i> <span data-i18n="inspectedTitle">Уже проверено:</span></h4>
            <div id="inspectedRoomsList" class="flex flex-wrap gap-2 text-sm text-indigo-700 font-medium">
                <span data-i18n="emptyList">(пока пусто)</span>
            </div>
        </div>

        <button onclick="finishDepartment()" class="w-full bg-red-600 text-white py-4 px-6 rounded-xl shadow-lg hover:bg-red-700 font-bold text-lg flex justify-center items-center" data-i18n="finishBtn">
            <i class="fas fa-flag-checkered mx-2"></i> Завершить проверку отделения
        </button>
    </div>

    <template id="issueTemplate">
        <div class="issue-row bg-white p-4 rounded-lg border border-gray-200 relative shadow-sm">
            <button onclick="this.parentElement.remove()" class="absolute -top-3 -right-3 bg-white text-red-500 w-8 h-8 rounded-full shadow border flex items-center justify-center"><i class="fas fa-times"></i></button>
            
            <select class="system-select w-full p-3 mb-2 rounded-md bg-gray-50 border border-gray-300 font-bold text-gray-800" onchange="toggleCustomInput(this)"></select>
            <input type="text" class="custom-system-input hidden w-full p-2 mb-4 rounded-md border border-gray-300" data-i18n-ph="customPlaceholder" placeholder="Впишите название...">
            
            <div class="rating-block flex gap-3 my-4 justify-center">
                <button data-v="1" class="rb w-12 h-12 rounded-full bg-red-500 text-white font-bold shadow-sm" onclick="setRating(this, 1)">1</button>
                <button data-v="2" class="rb w-12 h-12 rounded-full bg-orange-500 text-white font-bold shadow-sm" onclick="setRating(this, 2)">2</button>
                <button data-v="3" class="rb w-12 h-12 rounded-full bg-yellow-500 text-white font-bold shadow-sm" onclick="setRating(this, 3)">3</button>
            </div>
            
            <div class="flex gap-2 items-start">
                <textarea class="comment-text flex-1 p-3 text-sm border border-gray-300 rounded-md" rows="2" data-i18n-ph="commentPlaceholder" placeholder="Опишите недочёт..."></textarea>
                <label class="p-3 bg-gray-50 border border-gray-300 rounded-md cursor-pointer flex flex-col items-center justify-center w-16 h-[74px]">
                    <i class="fas fa-camera text-gray-500 text-xl"></i>
                    <input type="file" accept="image/*" capture="environment" class="hidden photo-input" onchange="handlePhoto(this)">
                </label>
            </div>
            <div class="photo-indicator hidden text-xs text-green-600 font-bold mt-2"><i class="fas fa-check-circle mx-1"></i>Фото добавлено</div>
        </div>
    </template>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxMN6s8ektwhHxuE_8xDz1ZaeqYyXaLyniwi_xFpbzVEjFEo_AUd6PybJk6nGKxmy7E/exec";
        
        // Словари
        const dict = {
            ru: { syncText: "Отправка данных...", title: "Инспекция Систем", subtitle: "Регистрация неисправностей", inspectorLabel: "ФИО проверяющего", deptLabel: "Отделение (например, A 1)", startBtn: "Начать инспекцию", roomCheckTitle: "Проверка помещений", exitBtn: "Выход", roomLabel: "Номер комнаты:", roomPlaceholder: "Напр: 101", okBtn: "ОК", roomPrefix: "Комната:", addIssueBtn: "Добавить дефект", saveRoomBtn: "Сохранить помещение", inspectedTitle: "Уже проверено:", emptyList: "(пусто)", finishBtn: "Завершить проверку отделения", selectDefault: "Выберите систему...", otherOption: "🔧 Другое (вписать)...", customPlaceholder: "Впишите название...", commentPlaceholder: "Описание (обязательно)..." },
            he: { syncText: "שולח נתונים...", title: "בדיקת מערכות", subtitle: "רישום תקלות במחלקה", inspectorLabel: "שם הבודק", deptLabel: "מחלקה", startBtn: "התחל בדיקה", roomCheckTitle: "בדיקת חדרים", exitBtn: "יציאה", roomLabel: "מספר חדר:", roomPlaceholder: "לדוגמה: 101", okBtn: "אישור", roomPrefix: "חדר:", addIssueBtn: "הוסף תקלה", saveRoomBtn: "שמור נתוני חדר", inspectedTitle: "כבר נבדקו:", emptyList: "(ריק)", finishBtn: "סיים בדיקת מחלקה", selectDefault: "בחר מערכת...", otherOption: "🔧 אחר (הזן ידנית)...", customPlaceholder: "הזן שם...", commentPlaceholder: "תיאור (חובה)..." }
        };

        const userLang = navigator.language || navigator.userLanguage;
        const isHebrew = userLang.toLowerCase().startsWith('he');
        const langCode = isHebrew ? 'he' : 'ru';
        const T = dict[langCode];

        let state = { 
            inspector: '', department: '', inspectedRooms: [], systemsList: [], stats: { critical: 0, replace: 0 }, isRunning: false
        };

        // Защита от случайного закрытия вкладки
        window.addEventListener('beforeunload', function (e) {
            if (state.isRunning) {
                e.preventDefault();
                e.returnValue = '';
            }
        });

        document.addEventListener("DOMContentLoaded", () => {
            if (isHebrew) {
                document.documentElement.dir = 'rtl';
                document.documentElement.lang = 'he';
                document.getElementById('roomName').classList.replace('rounded-l-md', 'rounded-r-md');
                document.getElementById('roomName').nextElementSibling.classList.replace('rounded-r-md', 'rounded-l-md');
            }
            applyTranslations(document);
            restoreSession(); // Пытаемся восстановить сессию при запуске!
        });

        function applyTranslations(container) {
            container.querySelectorAll('[data-i18n]').forEach(el => el.innerHTML = T[el.dataset.i18n]);
            container.querySelectorAll('[data-i18n-ph]').forEach(el => el.placeholder = T[el.getAttribute('data-i18n-ph')]);
        }

        // --- СИСТЕМА СОХРАНЕНИЯ СОСТОЯНИЯ ---
        function saveSession() {
            localStorage.setItem('hcl_state', JSON.stringify(state));
        }

        function restoreSession() {
            const saved = localStorage.getItem('hcl_state');
            if (saved) {
                state = JSON.parse(saved);
                if (state.isRunning) {
                    document.getElementById('headerInfo').innerHTML = `<span class="font-bold text-indigo-600">${state.inspector}</span> | ${state.department}`;
                    updateInspectedUI();
                    navigate('inspectionPage');
                }
            }
        }

        function clearSession() {
            state.isRunning = false;
            localStorage.removeItem('hcl_state');
            location.reload();
        }

        function confirmExit() {
            if(confirm(isHebrew ? "לצאת מהבדיקה? הנתונים שלא נשלחו יאבדו." : "Выйти из инспекции? Несохраненные данные комнаты будут потеряны.")) {
                clearSession();
            }
        }
        // ------------------------------------

        async function startInspection() {
            const insp = document.getElementById('inspectorName').value.trim();
            const dept = document.getElementById('department').value.trim();
            if(!insp || !dept) return alert(isHebrew ? "מלא את כל השדות!" : "Заполните все поля!");
            
            state.inspector = insp;
            state.department = dept;
            state.isRunning = true;
            
            showLoader(isHebrew ? "טוען הגדרות..." : "Загрузка настроек...");
            try {
                // Пытаемся взять настройки из кэша, если нет интернета
                const cachedSystems = localStorage.getItem('hcl_systems');
                if (cachedSystems) state.systemsList = JSON.parse(cachedSystems);

                const res = await fetch(`${API_URL}?action=getSettings`);
                const data = await res.json();
                if (data.systems && data.systems.length > 0) {
                    state.systemsList = data.systems.filter(s => s !== "");
                    localStorage.setItem('hcl_systems', JSON.stringify(state.systemsList)); // Кэшируем
                }
            } catch(e) { console.log("Используем кэш или стандартные системы"); }
            
            if(state.systemsList.length === 0) {
                state.systemsList = isHebrew ? ["חלון", "דלת", "קיר"] : ["Окно", "Дверь", "Стена"];
            }

            saveSession(); // Сохраняем начало сессии
            document.getElementById('headerInfo').innerHTML = `<span class="font-bold text-indigo-600">${state.inspector}</span> | ${state.department}`;
            navigate('inspectionPage');
            hideLoader();
        }

        function openRoom() {
            const name = document.getElementById('roomName').value.trim();
            if(!name) return;
            state.currentRoom = name;
            document.getElementById('currentRoomDisplay').innerText = name;
            document.getElementById('issuesList').innerHTML = ''; 
            document.getElementById('activeRoomBlock').classList.remove('hidden');
        }

        function addIssueRow() {
            const temp = document.getElementById('issueTemplate').content.cloneNode(true);
            applyTranslations(temp);
            const select = temp.querySelector('.system-select');
            let opts = `<option value="" disabled selected>${T.selectDefault}</option>`;
            state.systemsList.forEach(s => opts += `<option value="${s}">${s}</option>`);
            opts += `<option value="OTHER">${T.otherOption}</option>`;
            select.innerHTML = opts;
            document.getElementById('issuesList').appendChild(temp);
        }

        function toggleCustomInput(sel) {
            const inp = sel.parentElement.querySelector('.custom-system-input');
            if (sel.value === 'OTHER') { inp.classList.remove('hidden'); inp.focus(); } 
            else { inp.classList.add('hidden'); inp.value = ''; }
        }

        function setRating(btn, val) {
            const parent = btn.parentElement;
            parent.querySelectorAll('.rb').forEach(b => b.classList.remove('selected', 'ring-2', 'ring-offset-2', 'ring-gray-800'));
            btn.classList.add('selected', 'ring-2', 'ring-offset-2', 'ring-gray-800');
            parent.dataset.val = val;
        }

        async function handlePhoto(input) {
            const file = input.files[0];
            if(!file) return;
            const icon = input.closest('label').querySelector('i');
            icon.className = "fas fa-spinner fa-spin text-indigo-500 text-xl";

            const base64 = await new Promise(resolve => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const scale = 800 / img.width;
                        canvas.width = 800; canvas.height = img.height * scale;
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        resolve(canvas.toDataURL('image/jpeg', 0.6)); 
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
            input.dataset.base64 = base64;
            icon.className = "fas fa-camera text-green-500 text-xl";
            input.closest('.issue-row').querySelector('.photo-indicator').classList.remove('hidden');
        }

        async function saveRoomData() {
            const rows = document.querySelectorAll('.issue-row');
            if(rows.length === 0) return processRoomSuccess();

            const items = [];
            for(let row of rows) {
                let sys = row.querySelector('.system-select').value;
                if(sys === 'OTHER') sys = row.querySelector('.custom-system-input').value.trim();
                const rBlock = row.querySelector('.rating-block');
                const rating = rBlock ? rBlock.dataset.val : null;
                const comment = row.querySelector('.comment-text').value.trim();
                
                if(!sys || !rating || !comment) return alert(isHebrew ? "מלא את כל שדות החובה!" : "Заполните все поля и оценки!");
                
                items.push({ name: sys, score: rating, comment: comment, photoBase64: row.querySelector('.photo-input').dataset.base64 || "" });
                if(rating <= 2) state.stats.critical++;
                if(rating == 1) state.stats.replace++;
            }

            showLoader(T.syncText);
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ inspector: state.inspector, department: state.department, room: state.currentRoom, items: items })
                });
                await res.json();
                processRoomSuccess();
            } catch(e) {
                alert("Ошибка сети. Попробуйте сохранить еще раз.");
            }
            hideLoader();
        }

        function processRoomSuccess() {
            if(!state.inspectedRooms.includes(state.currentRoom)) {
                state.inspectedRooms.push(state.currentRoom);
                saveSession(); // Сохраняем прогресс!
                updateInspectedUI();
            }
            document.getElementById('activeRoomBlock').classList.add('hidden');
            document.getElementById('roomName').value = '';
            window.scrollTo(0, 0); 
        }

        function updateInspectedUI() {
            const listDiv = document.getElementById('inspectedRoomsList');
            if(state.inspectedRooms.length > 0) listDiv.innerHTML = '';
            state.inspectedRooms.forEach(room => {
                const badge = document.createElement('span');
                badge.className = "bg-white border border-indigo-200 text-indigo-700 px-3 py-1 rounded-full shadow-sm";
                badge.innerText = room;
                listDiv.appendChild(badge);
            });
        }

        async function finishDepartment() {
            if(state.inspectedRooms.length === 0) return alert(isHebrew ? "לא נבדקו חדרים!" : "Вы не проверили ни одной комнаты!");
            if(!confirm(isHebrew ? "לסיים ולשלוח דיווח לטלגרם?" : "Завершить и отправить отчет в Telegram?")) return;
            
            showLoader("Отправка отчета...");
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: "FINISH_DEPT", inspector: state.inspector, department: state.department,
                        criticalCount: state.stats.critical, replaceCount: state.stats.replace, roomsCount: state.inspectedRooms.length
                    })
                });
                alert("✅ Отчет отправлен!");
                clearSession(); // Успешно закончили - удаляем сессию
            } catch (e) {
                alert("Ошибка интернета. Не удалось закрыть отделение.");
                hideLoader();
            }
        }

        function navigate(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        function showLoader(txt) { document.getElementById('loaderText').innerText = txt; document.getElementById('loader').classList.remove('hidden'); }
        function hideLoader() { document.getElementById('loader').classList.add('hidden'); }
    </script>
</body>
</html>
