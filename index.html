<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Инспектор Больничных Систем</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .page { display: none; }
        .page.active { display: block; }
        .rating-btn.selected { border-width: 3px; border-color: #000; }
        .loader-overlay { background: rgba(255,255,255,0.8); z-index: 100; }
    </style>
</head>
<body class="bg-gray-100">

    <div id="loader" class="fixed inset-0 flex flex-col items-center justify-center hidden loader-overlay">
        <div class="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
        <p class="mt-4 font-medium text-gray-700">Синхронизация с базой...</p>
    </div>

    <div id="setupPage" class="page active p-6 max-w-md mx-auto">
        <div class="bg-white p-6 rounded-2xl shadow-xl">
            <h1 class="text-2xl font-bold text-center mb-6">🏥 Вход в систему</h1>
            <input type="text" id="inspectorName" placeholder="ФИО инспектора" class="w-full mb-4 p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
            <input type="text" id="department" placeholder="Название отделения (например, A 1)" class="w-full mb-6 p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
            <button onclick="startInspection()" class="w-full bg-indigo-600 text-white p-4 rounded-xl font-bold shadow-lg hover:bg-indigo-700 transition-colors">Начать инспекцию</button>
        </div>
    </div>

    <div id="inspectionPage" class="page p-4 max-w-2xl mx-auto">
        <div class="bg-white p-5 rounded-2xl shadow-lg mb-6">
            <div class="flex justify-between items-center mb-4 border-b pb-4">
                <h2 class="font-bold text-gray-800" id="headerInfo"></h2>
                <button onclick="location.reload()" class="text-gray-400 hover:text-red-500 transition-colors" title="Выйти"><i class="fas fa-sign-out-alt fa-lg"></i></button>
            </div>
            
            <div id="roomInputBlock">
                <label class="block text-sm font-medium text-gray-700 mb-1">Номер комнаты / Помещение:</label>
                <div class="flex gap-2">
                    <input type="text" id="roomName" class="flex-1 p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="Напр: 101 или Склад">
                    <button onclick="openRoom()" class="bg-indigo-600 text-white px-6 rounded-lg font-bold hover:bg-indigo-700">ОК</button>
                </div>
            </div>

            <div id="activeRoomBlock" class="hidden mt-4 pt-4 border-t">
                <h3 class="font-bold text-indigo-600 mb-4 text-lg">Комната: <span id="currentRoomDisplay"></span></h3>
                
                <div id="issuesList" class="space-y-4 mb-6">
                    </div>

                <button onclick="addIssueRow()" class="w-full border-2 border-dashed border-indigo-300 text-indigo-600 p-3 rounded-lg mb-6 hover:bg-indigo-50 transition-colors">
                    <i class="fas fa-plus-circle mr-2"></i>Добавить замечание
                </button>

                <button id="saveRoomBtn" onclick="saveRoomData()" class="w-full bg-green-600 text-white p-4 rounded-xl font-bold shadow-md hover:bg-green-700 transition-colors">
                    Сохранить проверку комнаты
                </button>
            </div>
        </div>

        <div class="bg-indigo-50 p-4 rounded-xl shadow-sm border border-indigo-100">
            <h4 class="text-xs font-bold text-indigo-400 uppercase mb-2">Уже проверено:</h4>
            <div id="inspectedRoomsList" class="flex flex-wrap gap-2 text-sm text-indigo-700 font-medium">
                (пока пусто)
            </div>
        </div>

        <button onclick="finishDepartment()" class="w-full mt-10 bg-red-500 text-white p-4 rounded-xl font-bold shadow-lg hover:bg-red-600 transition-colors">
            <i class="fas fa-flag-checkered mr-2"></i>Завершить инспекцию отделения
        </button>
    </div>

    <template id="issueTemplate">
        <div class="issue-row bg-gray-50 p-4 rounded-xl border border-gray-200 relative shadow-sm">
            <button onclick="this.parentElement.remove()" class="absolute -top-3 -right-3 bg-white text-red-500 w-8 h-8 rounded-full shadow border flex items-center justify-center hover:bg-red-50 hover:text-red-600 transition-colors z-10"><i class="fas fa-times"></i></button>
            <select class="system-select w-full p-2 mb-3 rounded-lg bg-white border font-bold text-gray-800 focus:ring-2 focus:ring-indigo-500 outline-none">
                </select>
            <div class="flex gap-2 mb-3 justify-center">
                <button data-v="1" class="rb w-12 h-12 rounded-full bg-red-500 text-white font-bold shadow-sm" onclick="setRating(this, 1)">1</button>
                <button data-v="2" class="rb w-12 h-12 rounded-full bg-orange-500 text-white font-bold shadow-sm" onclick="setRating(this, 2)">2</button>
                <button data-v="3" class="rb w-12 h-12 rounded-full bg-yellow-500 text-white font-bold shadow-sm" onclick="setRating(this, 3)">3</button>
                <button data-v="
