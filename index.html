<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Инспектор Больничных Систем</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .page { display: none; }
        .page.active { display: block; }
        .rating-btn.selected { border-width: 3px; border-color: #000; }
        .loader-overlay { background: rgba(255,255,255,0.8); z-index: 100; }
        
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4f46e5;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-gray-100">

    <div id="loader" class="fixed inset-0 flex flex-col items-center justify-center hidden loader-overlay">
        <div class="loader"></div>
        <p class="mt-4 text-gray-600 font-medium" data-i18n="syncText">Синхронизация с базой...</p>
    </div>

    <div id="setupPage" class="page active p-4 md:p-8 max-w-lg mx-auto mt-10">
        <div class="bg-white p-6 rounded-xl shadow-md">
            <div class="text-center mb-6">
                <i class="fas fa-hospital-user fa-3x text-indigo-500"></i>
                <h1 class="text-2xl font-bold text-gray-800 mt-2" data-i18n="title">Инспекция Систем</h1>
                <p class="text-gray-500" data-i18n="subtitle">Регистрация неисправностей</p>
            </div>
            
            <div class="space-y-4">
                <div>
                    <label for="inspectorName" class="block text-sm font-medium text-gray-700" data-i18n="inspectorLabel">ФИО проверяющего</label>
                    <input type="text" id="inspectorName" class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
                </div>
                <div>
                    <label for="department" class="block text-sm font-medium text-gray-700" data-i18n="deptLabel">Отделение (например, A 1)</label>
                    <input type="text" id="department" class="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500">
                </div>
            </div>

            <div class="mt-8 space-y-3">
                <button onclick="startInspection()" class="w-full bg-indigo-600 text-white py-3 px-4 border border-transparent rounded-md shadow-sm text-base font-medium hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors" data-i18n="startBtn">
                    Начать инспекцию
                </button>
                <button onclick="showRatingHint()" class="w-full bg-gray-100 text-gray-700 py-2 px-4 border border-gray-300 rounded-md shadow-sm text-sm font-medium hover:bg-gray-200 transition-colors">
                    <i class="fas fa-info-circle mx-1"></i> <span data-i18n="hintBtn">Памятка по оценкам</span>
                </button>
            </div>
        </div>
    </div>

    <div id="inspectionPage" class="page p-4 md:p-8 max-w-4xl mx-auto">
        <div class="bg-white p-6 rounded-xl shadow-md mb-6">
            <div class="flex justify-between items-center mb-4 border-b pb-4">
                <div>
                    <h2 class="text-xl font-bold text-gray-800" data-i18n="roomCheckTitle">Проверка помещений</h2>
                    <p class="text-sm text-gray-500" id="headerInfo"></p>
                </div>
                <button onclick="location.reload()" class="bg-gray-200 text-gray-600 py-2 px-4 rounded-md shadow-sm hover:bg-gray-300 transition-colors" title="Выход">
                    <i class="fas fa-sign-out-alt mx-1"></i> <span data-i18n="exitBtn">Выход</span>
                </button>
            </div>
            
            <div id="roomInputBlock">
                <label class="block text-sm font-medium text-gray-700 mb-1" data-i18n="roomLabel">Номер комнаты / Название помещения:</label>
                <div class="mt-1 flex rounded-md shadow-sm">
                    <input type="text" id="roomName" class="flex-1 block w-full min-w-0 rounded-none px-3 py-2 border border-gray-300 focus:ring-indigo-500 focus:border-indigo-500" data-i18n-ph="roomPlaceholder" placeholder="Напр: Палата 101 или Склад">
                    <button onclick="openRoom()" class="inline-flex items-center px-6 py-2 border border-indigo-600 bg-indigo-600 text-white hover:bg-indigo-700 font-bold transition-colors" data-i18n="okBtn">ОК</button>
                </div>
            </div>

            <div id="activeRoomBlock" class="hidden mt-6 pt-4 border-t">
                <h3 class="text-lg font-semibold text-gray-700 mb-4"><span data-i18n="roomPrefix">Помещение:</span> <span id="currentRoomDisplay" class="text-indigo-600 font-bold"></span></h3>
                
                <div id="issuesList" class="space-y-5 mb-6">
                    </div>

                <button onclick="addIssueRow()" class="w-full border-2 border-dashed border-indigo-300 text-indigo-600 bg-indigo-50 py-3 px-4 rounded-lg mb-6 hover:bg-indigo-100 transition-colors font-medium flex justify-center items-center">
                    <i class="fas fa-plus-circle mx-2 text-lg"></i> <span data-i18n="addIssueBtn">Добавить дефект / замечание</span>
                </button>

                <div class="flex justify-end">
                    <button id="saveRoomBtn" onclick="saveRoomData()" class="w-full sm:w-auto bg-green-600 text-white py-3 px-6 rounded-md shadow-sm hover:bg-green-700 font-bold transition-colors" data-i18n="saveRoomBtn">
                        Сохранить помещение
                    </button>
                </div>
            </div>
        </div>

        <div class="bg-indigo-50 p-5 rounded-xl shadow-sm border border-indigo-100 mb-8">
            <h4 class="text-xs font-bold text-indigo-400 uppercase mb-3"><i class="fas fa-check-double mx-1"></i> <span data-i18n="inspectedTitle">Уже проверено в этом отделении:</span></h4>
            <div id="inspectedRoomsList" class="flex flex-wrap gap-2 text-sm text-indigo-700 font-medium">
                <span data-i18n="emptyList">(пока пусто)</span>
            </div>
        </div>

        <div class="border-t pt-6 flex flex-col sm:flex-row justify-between items-center bg-red-50 p-5 rounded-xl shadow-sm border border-red-100">
            <p class="text-sm text-red-800 font-medium mb-4 sm:mb-0"><i class="fas fa-exclamation-circle mx-2 text-lg"></i><span data-i18n="finishQuestion">Проверили все помещения?</span></p>
            <button onclick="finishDepartment()" class="w-full sm:w-auto bg-red-600 text-white py-3 px-6 rounded-md shadow-sm hover:bg-red-700 font-bold transition-colors" data-i18n="finishBtn">
                Завершить проверку отделения
            </button>
        </div>
    </div>

    <template id="issueTemplate">
        <div class="issue-row bg-white p-4 rounded-lg border border-gray-200 relative shadow-sm">
            <button onclick="this.parentElement.remove()" class="absolute -top-3 -right-3 bg-white text-red-500 w-8 h-8 rounded-full shadow border flex items-center justify-center hover:bg-red-50 hover:text-red-600 transition-colors z-10" title="Удалить"><i class="fas fa-times"></i></button>
            
            <label class="block text-xs font-bold text-gray-500 uppercase mb-1" data-i18n="whatBroken">Что сломано?</label>
            <select class="system-select w-full p-2 mb-2 rounded-md bg-gray-50 border border-gray-300 font-semibold text-gray-800 focus:ring-2 focus:ring-indigo-500 outline-none" onchange="toggleCustomInput(this)">
                </select>
            
            <input type="text" class="custom-system-input hidden w-full p-2 mb-4 rounded-md border border-gray-300 focus:ring-2 focus:ring-indigo-500 outline-none" data-i18n-ph="customPlaceholder" placeholder="Впишите название или объект...">
            
            <label class="block text-xs font-bold text-gray-500 uppercase mt-2 mb-2 text-center" data-i18n="ratingLabel">Оценка состояния</label>
            <div class="rating-block flex gap-3 mb-4 justify-center">
                <button data-v="1" class="rb w-12 h-12 rounded-full bg-red-500 text-white font-bold shadow-sm transition-transform transform hover:scale-105" onclick="setRating(this, 1)">1</button>
                <button data-v="2" class="rb w-12 h-12 rounded-full bg-orange-500 text-white font-bold shadow-sm transition-transform transform hover:scale-105" onclick="setRating(this, 2)">2</button>
                <button data-v="3" class="rb w-12 h-12 rounded-full bg-yellow-500 text-white font-bold shadow-sm transition-transform transform hover:scale-105" onclick="setRating(this, 3)">3</button>
            </div>
            
            <div class="flex gap-2 items-start">
                <textarea class="comment-text flex-1 p-3 text-sm border border-gray-300 rounded-md focus:ring-2 focus:ring-indigo-500 outline-none" rows="2" data-i18n-ph="commentPlaceholder" placeholder="Опишите недочёт (обязательно)..."></textarea>
                <label class="p-3 bg-gray-50 border border-gray-300 rounded-md cursor-pointer flex flex-col items-center justify-center w-16 h-[74px] hover:bg-gray-100 transition-colors">
                    <i class="fas fa-camera text-gray-500 text-xl"></i>
                    <span class="text-[10px] text-gray-500 mt-1 font-medium" data-i18n="photoLabel">Фото</span>
                    <input type="file" accept="image/*" capture="environment" class="hidden photo-input" onchange="handlePhoto(this)">
                </label>
            </div>
            <div class="photo-indicator hidden text-xs text-green-600 font-bold mt-2"><i class="fas fa-check-circle mx-1"></i><span data-i18n="photoAdded">Фотография прикреплена</span></div>
        </div>
    </template>

    <script>
        // ВОТ ВАША РАБОЧАЯ ССЫЛКА НА GOOGLE APPS SCRIPT
        const API_URL = "https://script.google.com/macros/s/AKfycbxMN6s8ektwhHxuE_8xDz1ZaeqYyXaLyniwi_xFpbzVEjFEo_AUd6PybJk6nGKxmy7E/exec";
        
        // СЛОВАРЬ ПЕРЕВОДОВ
        const dict = {
            ru: {
                syncText: "Синхронизация с базой...",
                title: "Инспекция Систем",
                subtitle: "Регистрация неисправностей",
                inspectorLabel: "ФИО проверяющего",
                deptLabel: "Отделение (например, A 1)",
                startBtn: "Начать инспекцию",
                hintBtn: "Памятка по оценкам",
                roomCheckTitle: "Проверка помещений",
                exitBtn: "Выход",
                roomLabel: "Номер комнаты / Название помещения:",
                roomPlaceholder: "Напр: Палата 101 или Склад",
                okBtn: "ОК",
                roomPrefix: "Помещение:",
                addIssueBtn: "Добавить дефект / замечание",
                saveRoomBtn: "Сохранить помещение",
                inspectedTitle: "Уже проверено в этом отделении:",
                emptyList: "(пока пусто)",
                finishQuestion: "Проверили все помещения?",
                finishBtn: "Завершить проверку отделения",
                whatBroken: "Что сломано?",
                selectDefault: "Выберите из списка...",
                otherOption: "🔧 Другое (вписать вручную)...",
                customPlaceholder: "Впишите название или объект...",
                ratingLabel: "Оценка состояния",
                commentPlaceholder: "Опишите недочёт (обязательно)...",
                photoLabel: "Фото",
                photoAdded: "Фотография прикреплена",
                alertFill: "Пожалуйста, заполните ФИО и Отделение!",
                alertRoom: "Введите номер или название помещения!",
                alertSystem: "Пожалуйста, выберите систему из списка!",
                alertCustom: "Пожалуйста, впишите название нестандартной поломки!",
                alertRating: "Пожалуйста, выберите оценку для:",
                alertComment: "Пожалуйста, опишите причину поломки для:",
                alertNoRooms: "Вы не проверили ни одной комнаты!",
                confirmFinish: "Вы уверены, что проверили все помещения?\nОтчет будет отправлен руководителю в Telegram.",
                successFinish: "✅ Проверка успешно завершена! Отчет отправлен в Telegram.",
                hintText: "ПАМЯТКА ПО ОЦЕНКАМ:\n\n3 - Удовлетворительно / Мелкий дефект\n2 - Требуется ремонт / Восстановление\n1 - Требуется срочная замена / Капитальный ремонт"
            },
            he: {
                syncText: "מסנכרן נתונים...",
                title: "בדיקת מערכות",
                subtitle: "רישום תקלות במחלקה",
                inspectorLabel: "שם הבודק",
                deptLabel: "מחלקה (למשל, A 1)",
                startBtn: "התחל בדיקה",
                hintBtn: "תזכורת ציונים",
                roomCheckTitle: "בדיקת חדרים",
                exitBtn: "יציאה",
                roomLabel: "מספר חדר / שם חלל:",
                roomPlaceholder: "לדוגמה: חדר 101 או מחסן",
                okBtn: "אישור",
                roomPrefix: "חדר:",
                addIssueBtn: "הוסף תקלה / הערה",
                saveRoomBtn: "שמור נתוני חדר",
                inspectedTitle: "כבר נבדקו במחלקה זו:",
                emptyList: "(עדיין ריק)",
                finishQuestion: "סיימת לבדוק את כל החדרים?",
                finishBtn: "סיים בדיקת מחלקה",
                whatBroken: "מה תקול?",
                selectDefault: "בחר מהרשימה...",
                otherOption: "🔧 אחר (הזן ידנית)...",
                customPlaceholder: "הזן שם מערכת או פריט...",
                ratingLabel: "דירוג מצב",
                commentPlaceholder: "תאר את התקלה (חובה)...",
                photoLabel: "תמונה",
                photoAdded: "תמונה צורפה",
                alertFill: "אנא מלא שם ומחלקה!",
                alertRoom: "הזן מספר או שם חדר!",
                alertSystem: "אנא בחר מערכת מהרשימה!",
                alertCustom: "אנא הזן את שם התקלה הלא שגרתית!",
                alertRating: "אנא בחר דירוג עבור:",
                alertComment: "אנא תאר את סיבת התקלה עבור:",
                alertNoRooms: "לא בדקת אף חדר!",
                confirmFinish: "האם אתה בטוח שבדקת את כל החללים?\nהדוח יישלח למנהל בטלגרם.",
                successFinish: "✅ הבדיקה הסתיימה בהצלחה! הדוח נשלח לטלגרם.",
                hintText: "תזכורת ציונים:\n\n3 - סביר / פגם קל\n2 - דורש תיקון / שחזור\n1 - דורש החלפה דחופה / שיפוץ כללי"
            }
        };

        // ЛОГИКА АВТОПЕРЕВОДА
        const userLang = navigator.language || navigator.userLanguage;
        const isHebrew = userLang.toLowerCase().startsWith('he');
        const langCode = isHebrew ? 'he' : 'ru';
        const T = dict[langCode];

        document.addEventListener("DOMContentLoaded", () => {
            if (isHebrew) {
                document.documentElement.dir = 'rtl';
                document.documentElement.lang = 'he';
                // Скругляем углы кнопок правильно для иврита
                document.getElementById('roomName').classList.replace('rounded-l-md', 'rounded-r-md');
                document.getElementById('roomName').nextElementSibling.classList.replace('rounded-r-md', 'rounded-l-md');
            }
            applyTranslations(document);
        });

        function applyTranslations(container) {
            container.querySelectorAll('[data-i18n]').forEach(el => {
                el.innerHTML = T[el.dataset.i18n];
            });
            container.querySelectorAll('[data-i18n-ph]').forEach(el => {
                el.placeholder = T[el.dataset.i18n-ph];
            });
        }

        // ОСНОВНОЙ КОД ПРИЛОЖЕНИЯ
        let state = { 
            inspector: '', department: '', currentRoom: '', 
            inspectedRooms: [], systemsList: [], 
            stats: { critical: 0, replace: 0 } 
        };

        function showRatingHint() {
            alert(T.hintText);
        }

        async function startInspection() {
            state.inspector = document.getElementById('inspectorName').value.trim();
            state.department = document.getElementById('department').value.trim();
            
            if(!state.inspector || !state.department) {
                return alert(T.alertFill);
            }
            
            showLoader();
            try {
                const res = await fetch(`${API_URL}?action=getSettings`);
                const data = await res.json();
                
                if (data.systems && data.systems.length > 0) {
                    state.systemsList = data.systems.filter(s => s !== "");
                } else {
                    state.systemsList = isHebrew ? ["חלון", "דלת", "קיר", "חשמל"] : ["Окно", "Дверь", "Стена", "Электрика"];
                }
                
                document.getElementById('headerInfo').innerHTML = `<span class="font-semibold text-indigo-600">${state.inspector}</span> &nbsp;|&nbsp; ${T.deptLabel.split(' ')[0]}: <span class="font-semibold text-indigo-600">${state.department}</span>`;
                navigate('inspectionPage');
            } catch(e) { 
                console.error(e);
                alert("Network error! / Ошибка сети!"); 
            }
            hideLoader();
        }

        function openRoom() {
            const name = document.getElementById('roomName').value.trim();
            if(!name) return alert(T.alertRoom);
            
            state.currentRoom = name;
            document.getElementById('currentRoomDisplay').innerText = name;
            document.getElementById('issuesList').innerHTML = ''; 
            document.getElementById('activeRoomBlock').classList.remove('hidden');
        }

        function addIssueRow() {
            const temp = document.getElementById('issueTemplate').content.cloneNode(true);
            applyTranslations(temp); // Переводим текст внутри новой карточки
            
            const select = temp.querySelector('.system-select');
            let optionsHTML = `<option value="" disabled selected>${T.selectDefault}</option>`;
            
            state.systemsList.forEach(s => {
                optionsHTML += `<option value="${s}">${s}</option>`;
            });
            optionsHTML += `<option value="OTHER">${T.otherOption}</option>`;
            
            select.innerHTML = optionsHTML;
            document.getElementById('issuesList').appendChild(temp);
        }

        function toggleCustomInput(selectElem) {
            const customInput = selectElem.parentElement.querySelector('.custom-system-input');
            if (selectElem.value === 'OTHER') {
                customInput.classList.remove('hidden');
                customInput.focus();
                selectElem.classList.replace('mb-4', 'mb-2'); 
            } else {
                customInput.classList.add('hidden');
                selectElem.classList.replace('mb-2', 'mb-4');
                customInput.value = ''; 
            }
        }

        function setRating(btn, val) {
            const parent = btn.parentElement;
            parent.querySelectorAll('.rb').forEach(b => b.classList.remove('selected', 'ring-2', 'ring-offset-2', 'ring-gray-800'));
            btn.classList.add('selected', 'ring-2', 'ring-offset-2', 'ring-gray-800');
            parent.dataset.val = val;
        }

        async function handlePhoto(input) {
            const file = input.files[0];
            if(!file) return;
            const indicator = input.closest('.issue-row').querySelector('.photo-indicator');
            const labelIcon = input.closest('label').querySelector('i');
            
            labelIcon.className = "fas fa-spinner fa-spin text-indigo-500 text-xl";

            const base64 = await new Promise(resolve => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const MAX_WIDTH = 800;
                        let width = img.width;
                        let height = img.height;

                        if (width > MAX_WIDTH) {
                            height = Math.round((height * MAX_WIDTH) / width);
                            width = MAX_WIDTH;
                        }
                        
                        canvas.width = width; 
                        canvas.height = height;
                        ctx.drawImage(img, 0, 0, width, height);
                        resolve(canvas.toDataURL('image/jpeg', 0.6)); 
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
            
            input.dataset.base64 = base64;
            labelIcon.className = "fas fa-camera text-green-500 text-xl";
            indicator.classList.remove('hidden');
        }

        async function saveRoomData() {
            const rows = document.querySelectorAll('.issue-row');
            
            if(rows.length === 0) {
                markRoomDone();
                return;
            }

            const items = [];
            for(let row of rows) {
                let systemName = row.querySelector('.system-select').value;
                
                if(!systemName) {
                    return alert(T.alertSystem);
                }
                
                if(systemName === 'OTHER') {
                    systemName = row.querySelector('.custom-system-input').value.trim();
                    if(!systemName) {
                        return alert(T.alertCustom);
                    }
                }

                const ratingBlock = row.querySelector('.rating-block');
                const rating = ratingBlock ? ratingBlock.dataset.val : null;
                const comment = row.querySelector('.comment-text').value.trim();
                
                if(!rating) {
                    return alert(`${T.alertRating} ${systemName}`);
                }
                if(!comment) {
                    return alert(`${T.alertComment} ${systemName}`);
                }
                
                items.push({
                    name: systemName,
                    score: rating,
                    comment: comment,
                    photoBase64: row.querySelector('.photo-input').dataset.base64 || ""
                });

                if(rating <= 2) state.stats.critical++;
                if(rating == 1) state.stats.replace++;
            }

            showLoader();
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        inspector: state.inspector, 
                        department: state.department,
                        room: state.currentRoom, 
                        items: items
                    })
                });
                const result = await res.json();
                if(result.status === "success") {
                    markRoomDone();
                } else {
                    alert("Server Error: " + result.message);
                }
            } catch(e) {
                console.error(e);
                alert("Network Error / Ошибка интернета");
            }
            hideLoader();
        }

        function markRoomDone() {
            if(!state.inspectedRooms.includes(state.currentRoom)) {
                state.inspectedRooms.push(state.currentRoom);
                
                const listDiv = document.getElementById('inspectedRoomsList');
                if(state.inspectedRooms.length === 1) listDiv.innerHTML = ''; 
                
                const badge = document.createElement('span');
                badge.className = "bg-white border border-indigo-200 text-indigo-700 px-3 py-1 rounded-full shadow-sm";
                badge.innerText = state.currentRoom;
                listDiv.appendChild(badge);
            }
            
            document.getElementById('activeRoomBlock').classList.add('hidden');
            document.getElementById('roomName').value = '';
            window.scrollTo(0, 0); 
        }

        async function finishDepartment() {
            if(state.inspectedRooms.length === 0) {
                return alert(T.alertNoRooms);
            }
            
            if(!confirm(T.confirmFinish)) {
                return;
            }
            
            showLoader();
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: "FINISH_DEPT",
                        inspector: state.inspector, 
                        department: state.department,
                        criticalCount: state.stats.critical,
                        replaceCount: state.stats.replace,
                        roomsCount: state.inspectedRooms.length
                    })
                });
                
                await res.json();
                alert(T.successFinish);
                location.reload(); 
            } catch (e) {
                console.error(e);
                alert("Error sending to Telegram / Ошибка отправки в Telegram");
                location.reload();
            }
        }

        function navigate(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        
        function showLoader() { 
            document.getElementById('loader').classList.remove('hidden'); 
        }
        
        function hideLoader() { 
            document.getElementById('loader').classList.add('hidden'); 
        }
    </script>
</body>
</html>
